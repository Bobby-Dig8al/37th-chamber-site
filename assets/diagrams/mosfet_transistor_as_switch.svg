<svg width="100%" viewBox="0 0 680 470" role="img" xmlns="http://www.w3.org/2000/svg" style="font-family:'Bahnschrift',system-ui,sans-serif">
<title>The transistor as a switch: a MOSFET in its off and on states</title>
<desc>Two MOSFET cross-sections. Left, gate at zero volts: the p-type channel blocks current, no electrons flow between source and drain. Right, a positive gate voltage inverts a thin layer of the channel into electrons, bridging source and drain so current flows. The gate voltage is the switch.</desc>
<defs>
<marker id="arrowblue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#4d82ff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
<marker id="arrowgold" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#d9b400" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="680" height="470" fill="#08080a"/>
<text x="340" y="34" text-anchor="middle" fill="#f3eede" font-size="17" letter-spacing="0.5">The transistor as a switch</text>
<text x="340" y="54" text-anchor="middle" fill="#8f8a73" font-size="12">A MOSFET: the gate voltage decides whether current may flow</text>

<line x1="340" y1="78" x2="340" y2="392" stroke="#26261f" stroke-width="1"/>

<text x="180" y="92" text-anchor="middle" fill="#d9b400" font-size="13" letter-spacing="1">OFF — GATE AT 0 V</text>
<text x="500" y="92" text-anchor="middle" fill="#4d82ff" font-size="13" letter-spacing="1">ON — GATE POSITIVE</text>

<g>
<rect x="40" y="200" width="280" height="150" rx="3" fill="#141410" stroke="#3a3a2e" stroke-width="0.6"/>
<text x="52" y="338" fill="#8f8a73" font-size="11">p-type body (holes, no free electrons)</text>

<rect x="60" y="170" width="62" height="50" rx="2" fill="#1c2440" stroke="#3a4a78" stroke-width="0.6"/>
<text x="91" y="199" text-anchor="middle" fill="#a0c0ff" font-size="12">n+</text>
<rect x="238" y="170" width="62" height="50" rx="2" fill="#1c2440" stroke="#3a4a78" stroke-width="0.6"/>
<text x="269" y="199" text-anchor="middle" fill="#a0c0ff" font-size="12">n+</text>

<rect x="122" y="160" width="116" height="9" fill="#3a3a2e" stroke="#5a5a48" stroke-width="0.5"/>
<rect x="126" y="138" width="108" height="22" rx="2" fill="#2a2a1a" stroke="#FFD60A" stroke-width="1"/>
<text x="180" y="153" text-anchor="middle" fill="#FFD60A" font-size="12">gate</text>

<line x1="180" y1="138" x2="180" y2="118" stroke="#5a5a48" stroke-width="1.4"/>
<text x="180" y="112" text-anchor="middle" fill="#8f8a73" font-size="11">0 V</text>

<text x="91" y="234" text-anchor="middle" fill="#a0c0ff" font-size="11">source</text>
<text x="269" y="234" text-anchor="middle" fill="#a0c0ff" font-size="11">drain</text>

<line x1="138" y1="190" x2="222" y2="190" stroke="#6e2a2a" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
<text x="180" y="186" text-anchor="middle" fill="#c25a5a" font-size="11">channel blocked</text>

<text x="180" y="372" text-anchor="middle" fill="#8f8a73" font-size="11.5">No channel → no current</text>
</g>

<g>
<rect x="360" y="200" width="280" height="150" rx="3" fill="#141410" stroke="#3a3a2e" stroke-width="0.6"/>
<text x="372" y="338" fill="#8f8a73" font-size="11">p-type body (holes, no free electrons)</text>

<rect x="380" y="170" width="62" height="50" rx="2" fill="#1c2440" stroke="#3a4a78" stroke-width="0.6"/>
<text x="411" y="199" text-anchor="middle" fill="#a0c0ff" font-size="12">n+</text>
<rect x="558" y="170" width="62" height="50" rx="2" fill="#1c2440" stroke="#3a4a78" stroke-width="0.6"/>
<text x="589" y="199" text-anchor="middle" fill="#a0c0ff" font-size="12">n+</text>

<rect x="442" y="160" width="116" height="9" fill="#3a3a2e" stroke="#5a5a48" stroke-width="0.5"/>
<rect x="446" y="138" width="108" height="22" rx="2" fill="#2a2a1a" stroke="#FFD60A" stroke-width="1"/>
<text x="500" y="153" text-anchor="middle" fill="#FFD60A" font-size="12">gate</text>

<line x1="500" y1="138" x2="500" y2="114" stroke="#4d82ff" stroke-width="1.6"/>
<circle cx="500" cy="111" r="3" fill="#4d82ff"/>
<text x="514" y="115" fill="#4d82ff" font-size="11">+V</text>

<text x="411" y="234" text-anchor="middle" fill="#a0c0ff" font-size="11">source</text>
<text x="589" y="234" text-anchor="middle" fill="#a0c0ff" font-size="11">drain</text>

<line x1="458" y1="190" x2="542" y2="190" stroke="#0E44FF" stroke-width="7" stroke-linecap="round"/>
<line x1="458" y1="190" x2="542" y2="190" stroke="#4d82ff" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
<circle cx="468" cy="190" r="1.8" fill="#a0c0ff"/><circle cx="486" cy="190" r="1.8" fill="#a0c0ff"/><circle cx="504" cy="190" r="1.8" fill="#a0c0ff"/><circle cx="522" cy="190" r="1.8" fill="#a0c0ff"/><circle cx="540" cy="190" r="1.8" fill="#a0c0ff"/>
<text x="500" y="183" text-anchor="middle" fill="#a0c0ff" font-size="11">inversion layer — electrons</text>

<line x1="442" y1="245" x2="558" y2="245" stroke="#4d82ff" stroke-width="2" marker-end="url(#arrowblue)" opacity="0.95"/>
<text x="500" y="263" text-anchor="middle" fill="#4d82ff" font-size="11">current flows source → drain</text>

<text x="500" y="372" text-anchor="middle" fill="#a0c0ff" font-size="11.5">Channel inverted → current flows</text>
</g>

<line x1="40" y1="404" x2="640" y2="404" stroke="#26261f" stroke-width="0.6"/>
<text x="40" y="426" fill="#f3eede" font-size="12">The mechanism</text>
<text x="40" y="446" fill="#8f8a73" font-size="11.5">A positive gate voltage pulls electrons up through the thin oxide into the body's surface, inverting a sliver of</text>
<text x="40" y="462" fill="#8f8a73" font-size="11.5">p-type into an n-type bridge. That bridge connects source to drain — the gate is the switch, oxide blocks DC.</text>
</svg>