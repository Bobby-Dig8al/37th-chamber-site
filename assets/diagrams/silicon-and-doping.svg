<svg viewBox="0 0 1120 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d" font-family="Bahnschrift, system-ui, sans-serif">
<title id="t">Silicon and doping: pure crystal, n-type and p-type, and the p-n junction</title>
<desc id="d">Pure silicon shares four electrons per atom in covalent bonds. Phosphorus doping adds a free electron (n-type); boron doping adds a hole (p-type). Joining them, free electrons and holes recombine at the boundary, leaving fixed charged ions that form a depletion region with a built-in electric field — the diode at the heart of every transistor.</desc>
<defs>
<marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#4d82ff"/></marker>
<marker id="arg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#d9b400"/></marker>
</defs>
<rect width="1120" height="720" fill="#08080a"/>

<!-- header -->
<text x="40" y="46" fill="#FFD60A" font-size="27" font-weight="700" letter-spacing="0.5">SILICON &amp; DOPING</text>
<text x="40" y="70" fill="#8f8a73" font-size="14.5" letter-spacing="1.2">THE ATOMIC BASIS OF THE TRANSISTOR · CHIP WAR</text>
<line x1="40" y1="84" x2="1080" y2="84" stroke="#d9b400" stroke-width="1" opacity="0.45"/>

<!-- ===================== PANEL 1: PURE SILICON ===================== -->
<text x="40" y="118" fill="#FFD60A" font-size="16" font-weight="700">1 · PURE SILICON</text>
<text x="40" y="138" fill="#8f8a73" font-size="12.5">Each atom shares 4 electrons — full bonds, no free charge</text>

<g transform="translate(40,150)">
<rect x="0" y="0" width="320" height="270" rx="6" fill="none" stroke="#2a2a2e" stroke-width="1"/>
<!-- 4 silicon atoms in a 2x2 covalent grid -->
<!-- bonds (each = 2 shared electrons) -->
<g stroke="#3a4a7a" stroke-width="2">
<line x1="95" y1="80" x2="225" y2="80"/>
<line x1="95" y1="190" x2="225" y2="190"/>
<line x1="95" y1="80" x2="95" y2="190"/>
<line x1="225" y1="80" x2="225" y2="190"/>
</g>
<!-- shared electron pairs on bonds -->
<g fill="#4d82ff">
<circle cx="150" cy="74" r="4"/><circle cx="170" cy="86" r="4"/>
<circle cx="150" cy="184" r="4"/><circle cx="170" cy="196" r="4"/>
<circle cx="89" cy="125" r="4"/><circle cx="101" cy="145" r="4"/>
<circle cx="219" cy="125" r="4"/><circle cx="231" cy="145" r="4"/>
</g>
<!-- outward stub bonds (lattice continues) -->
<g stroke="#3a4a7a" stroke-width="2" stroke-dasharray="3 4">
<line x1="95" y1="80" x2="60" y2="45"/><line x1="225" y1="80" x2="260" y2="45"/>
<line x1="95" y1="190" x2="60" y2="225"/><line x1="225" y1="190" x2="260" y2="225"/>
</g>
<!-- Si cores -->
<g>
<circle cx="95" cy="80" r="22" fill="#0d0d12" stroke="#FFD60A" stroke-width="2"/>
<circle cx="225" cy="80" r="22" fill="#0d0d12" stroke="#FFD60A" stroke-width="2"/>
<circle cx="95" cy="190" r="22" fill="#0d0d12" stroke="#FFD60A" stroke-width="2"/>
<circle cx="225" cy="190" r="22" fill="#0d0d12" stroke="#FFD60A" stroke-width="2"/>
</g>
<g fill="#FFD60A" font-size="13" font-weight="700" text-anchor="middle">
<text x="95" y="85">Si</text><text x="225" y="85">Si</text>
<text x="95" y="195">Si</text><text x="225" y="195">Si</text>
</g>
<text x="160" y="255" fill="#8f8a73" font-size="11.5" text-anchor="middle">Insulator-like: every electron locked in a bond</text>
</g>
<!-- legend chip under panel1 -->
<g transform="translate(40,432)" font-size="11.5">
<circle cx="8" cy="0" r="4" fill="#4d82ff"/><text x="18" y="4" fill="#f3eede">shared electron</text>
<circle cx="148" cy="0" r="11" fill="#0d0d12" stroke="#FFD60A" stroke-width="1.6"/><text x="166" y="4" fill="#f3eede">Si atom core (+4)</text>
</g>

<!-- ===================== PANEL 2: DOPING ===================== -->
<text x="400" y="118" fill="#FFD60A" font-size="16" font-weight="700">2 · DOPING — ADD AN IMPURITY</text>
<text x="400" y="138" fill="#8f8a73" font-size="12.5">Swap one Si for an atom with one more / one fewer electron</text>

<!-- n-type -->
<g transform="translate(400,150)">
<rect x="0" y="0" width="300" height="135" rx="6" fill="none" stroke="#2a2a2e" stroke-width="1"/>
<text x="14" y="24" fill="#4d82ff" font-size="14" font-weight="700">n-TYPE · Phosphorus (5e⁻)</text>
<!-- center dopant + 4 si neighbors (compact cross) -->
<g stroke="#3a4a7a" stroke-width="2">
<line x1="150" y1="80" x2="80" y2="80"/><line x1="150" y1="80" x2="220" y2="80"/>
<line x1="150" y1="80" x2="150" y2="50"/><line x1="150" y1="80" x2="150" y2="110"/>
</g>
<g fill="#4d82ff">
<circle cx="112" cy="74" r="3.5"/><circle cx="188" cy="74" r="3.5"/>
<circle cx="144" cy="62" r="3.5"/><circle cx="156" cy="98" r="3.5"/>
</g>
<circle cx="80" cy="80" r="14" fill="#0d0d12" stroke="#d9b400" stroke-width="1.6"/>
<circle cx="220" cy="80" r="14" fill="#0d0d12" stroke="#d9b400" stroke-width="1.6"/>
<circle cx="150" cy="50" r="14" fill="#0d0d12" stroke="#d9b400" stroke-width="1.6"/>
<circle cx="150" cy="110" r="14" fill="#0d0d12" stroke="#d9b400" stroke-width="1.6"/>
<g fill="#d9b400" font-size="10" text-anchor="middle">
<text x="80" y="84">Si</text><text x="220" y="84">Si</text><text x="150" y="54">Si</text><text x="150" y="114">Si</text></g>
<circle cx="150" cy="80" r="17" fill="#0d0d12" stroke="#FFD60A" stroke-width="2.2"/>
<text x="150" y="85" fill="#FFD60A" font-size="13" font-weight="700" text-anchor="middle">P</text>
<!-- the extra free electron -->
<circle cx="248" cy="44" r="6" fill="#4d82ff"/>
<circle cx="248" cy="44" r="11" fill="none" stroke="#4d82ff" stroke-width="1" opacity="0.55"/>
<path d="M236 56 Q258 30 270 60" fill="none" stroke="#4d82ff" stroke-width="1.4" stroke-dasharray="2 3" marker-end="url(#ar)"/>
<text x="262" y="40" fill="#4d82ff" font-size="11" font-weight="700">free e⁻</text>
<text x="14" y="126" fill="#8f8a73" font-size="11">5th electron is unbound → roams → carries current</text>
</g>

<!-- p-type -->
<g transform="translate(400,295)">
<rect x="0" y="0" width="300" height="135" rx="6" fill="none" stroke="#2a2a2e" stroke-width="1"/>
<text x="14" y="24" fill="#FFD60A" font-size="14" font-weight="700">p-TYPE · Boron (3e⁻)</text>
<g stroke="#3a4a7a" stroke-width="2">
<line x1="150" y1="80" x2="80" y2="80"/><line x1="150" y1="80" x2="220" y2="80"/>
<line x1="150" y1="80" x2="150" y2="50"/>
<!-- missing bond drawn faint -->
<line x1="150" y1="80" x2="150" y2="110" stroke="#5a4a2a" stroke-dasharray="2 3"/>
</g>
<g fill="#4d82ff">
<circle cx="112" cy="74" r="3.5"/><circle cx="188" cy="74" r="3.5"/>
<circle cx="144" cy="62" r="3.5"/>
</g>
<circle cx="80" cy="80" r="14" fill="#0d0d12" stroke="#d9b400" stroke-width="1.6"/>
<circle cx="220" cy="80" r="14" fill="#0d0d12" stroke="#d9b400" stroke-width="1.6"/>
<circle cx="150" cy="50" r="14" fill="#0d0d12" stroke="#d9b400" stroke-width="1.6"/>
<circle cx="150" cy="110" r="14" fill="#0d0d12" stroke="#d9b400" stroke-width="1.6"/>
<g fill="#d9b400" font-size="10" text-anchor="middle">
<text x="80" y="84">Si</text><text x="220" y="84">Si</text><text x="150" y="54">Si</text><text x="150" y="114">Si</text></g>
<circle cx="150" cy="80" r="17" fill="#0d0d12" stroke="#FFD60A" stroke-width="2.2"/>
<text x="150" y="85" fill="#FFD60A" font-size="13" font-weight="700" text-anchor="middle">B</text>
<!-- the hole -->
<circle cx="156" cy="98" r="6" fill="none" stroke="#FFD60A" stroke-width="1.8" stroke-dasharray="3 2.5"/>
<text x="170" y="102" fill="#FFD60A" font-size="11" font-weight="700">hole (+)</text>
<text x="14" y="126" fill="#8f8a73" font-size="11">Missing bond = hole → neighbors fill it → it migrates</text>
</g>

<!-- ===================== PANEL 3: P-N JUNCTION ===================== -->
<text x="730" y="118" fill="#FFD60A" font-size="16" font-weight="700">3 · THE p–n JUNCTION</text>
<text x="730" y="138" fill="#8f8a73" font-size="12.5">Join the two: carriers recombine, fixed ions remain</text>

<g transform="translate(730,150)">
<rect x="0" y="0" width="350" height="280" rx="6" fill="#0a0a10" stroke="#2a2a2e" stroke-width="1"/>
<!-- p region -->
<rect x="2" y="2" width="148" height="200" fill="#15110a" opacity="0.8"/>
<!-- n region -->
<rect x="200" y="2" width="148" height="200" fill="#0b1024" opacity="0.85"/>
<!-- depletion region -->
<rect x="150" y="2" width="50" height="200" fill="#1a1a22"/>
<line x1="150" y1="2" x2="150" y2="202" stroke="#8f8a73" stroke-width="0.8" stroke-dasharray="3 3"/>
<line x1="200" y1="2" x2="200" y2="202" stroke="#8f8a73" stroke-width="0.8" stroke-dasharray="3 3"/>

<text x="74" y="22" fill="#FFD60A" font-size="13" font-weight="700" text-anchor="middle">p-type</text>
<text x="274" y="22" fill="#4d82ff" font-size="13" font-weight="700" text-anchor="middle">n-type</text>

<!-- mobile carriers away from junction: holes (p, left), electrons (n, right) -->
<g fill="#FFD60A">
<circle cx="30" cy="60" r="5" fill="none" stroke="#FFD60A" stroke-width="1.6" stroke-dasharray="3 2"/>
<circle cx="70" cy="95" r="5" fill="none" stroke="#FFD60A" stroke-width="1.6" stroke-dasharray="3 2"/>
<circle cx="45" cy="135" r="5" fill="none" stroke="#FFD60A" stroke-width="1.6" stroke-dasharray="3 2"/>
<circle cx="95" cy="160" r="5" fill="none" stroke="#FFD60A" stroke-width="1.6" stroke-dasharray="3 2"/>
</g>
<g fill="#4d82ff">
<circle cx="320" cy="60" r="5"/><circle cx="280" cy="95" r="5"/>
<circle cx="305" cy="135" r="5"/><circle cx="255" cy="165" r="5"/>
</g>

<!-- fixed ions in depletion zone: p-side negative acceptor ions, n-side positive donor ions -->
<g font-size="13" font-weight="700" text-anchor="middle">
<circle cx="163" cy="55" r="9" fill="#0d0d12" stroke="#d9b400" stroke-width="1.4"/><text x="163" y="60" fill="#d9b400">−</text>
<circle cx="163" cy="105" r="9" fill="#0d0d12" stroke="#d9b400" stroke-width="1.4"/><text x="163" y="110" fill="#d9b400">−</text>
<circle cx="163" cy="155" r="9" fill="#0d0d12" stroke="#d9b400" stroke-width="1.4"/><text x="163" y="160" fill="#d9b400">−</text>
<circle cx="187" cy="55" r="9" fill="#0d0d12" stroke="#4d82ff" stroke-width="1.4"/><text x="187" y="60" fill="#4d82ff">+</text>
<circle cx="187" cy="105" r="9" fill="#0d0d12" stroke="#4d82ff" stroke-width="1.4"/><text x="187" y="110" fill="#4d82ff">+</text>
<circle cx="187" cy="155" r="9" fill="#0d0d12" stroke="#4d82ff" stroke-width="1.4"/><text x="187" y="160" fill="#4d82ff">+</text>
</g>

<!-- depletion bracket -->
<text x="175" y="218" fill="#f3eede" font-size="11" font-weight="700" text-anchor="middle">depletion</text>
<text x="175" y="231" fill="#f3eede" font-size="11" font-weight="700" text-anchor="middle">region</text>

<!-- built-in electric field arrow: from + (n) to - (p), i.e. pointing left -->
<line x1="195" y1="248" x2="155" y2="248" stroke="#d9b400" stroke-width="2" marker-end="url(#arg)"/>
<text x="175" y="266" fill="#d9b400" font-size="11" text-anchor="middle">built-in field E</text>

<!-- recombination note at the boundary -->
<path d="M150 95 q12 5 24 0" fill="none" stroke="#f3eede" stroke-width="1" opacity="0.5"/>

<text x="74" y="195" fill="#8f8a73" font-size="10.5" text-anchor="middle">mobile holes</text>
<text x="274" y="195" fill="#8f8a73" font-size="10.5" text-anchor="middle">mobile electrons</text>
</g>

<!-- payoff strip -->
<g transform="translate(730,448)">
<rect x="0" y="0" width="350" height="56" rx="5" fill="#0d0d12" stroke="#d9b400" stroke-width="1" opacity="0.9"/>
<text x="14" y="23" fill="#FFD60A" font-size="12.5" font-weight="700">THIS IS A DIODE — current flows one way.</text>
<text x="14" y="42" fill="#f3eede" font-size="11.5">Stack two junctions and a control gate → the transistor:</text>
<text x="14" y="50" fill="#f3eede" font-size="0"> </text>
</g>

<!-- bottom takeaway band spanning panels 1-2 -->
<g transform="translate(40,470)">
<text x="0" y="0" fill="#8f8a73" font-size="12.5" letter-spacing="0.3">THE MECHANISM, IN ONE LINE</text>
<line x1="0" y1="10" x2="640" y2="10" stroke="#2a2a2e" stroke-width="1"/>
<text x="0" y="34" fill="#f3eede" font-size="13.5">Pure silicon holds every electron in a bond. Doping injects a spare</text>
<text x="0" y="54" fill="#f3eede" font-size="13.5">electron (n) or an empty slot — a hole (p). Bring them together and the</text>
<text x="0" y="74" fill="#f3eede" font-size="13.5">junction self-builds a charged barrier whose field is the on/off switch.</text>
</g>

<!-- footer rule + mast -->
<line x1="40" y1="690" x2="1080" y2="690" stroke="#2a2a2e" stroke-width="1"/>
<text x="40" y="709" fill="#8f8a73" font-size="11.5" letter-spacing="1">37TH CHAMBER · THE CHIP WAR · FIG. — SILICON &amp; DOPING</text>
<text x="1080" y="709" fill="#d9b400" font-size="11.5" text-anchor="end" letter-spacing="0.5">from sand to switch</text>
</svg>