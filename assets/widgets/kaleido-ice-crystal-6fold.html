<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ice Crystal 6-Fold — Day Kaleidoscope Candidate</title>
<style>
  :root{
    --gold:#FFD60A;
    --field:#08080a;
    --eblue:#0E44FF;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background-color:var(--field);
    background-image:
      linear-gradient(rgba(255,214,10,.045) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,214,10,.045) 1px, transparent 1px);
    background-size:32px 32px;
    color:var(--gold);
    font-family:system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:30px;
    padding:40px 16px;
  }
  h1{
    font-size:11px;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:.32em;
    margin:0;
    text-align:center;
    color:var(--gold);
    opacity:.92;
  }
  .stage{
    display:flex;
    gap:56px;
    align-items:flex-start;
    justify-content:center;
    flex-wrap:wrap;
  }
  .cell{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
  }
  .disc{
    border-radius:50%;
    overflow:hidden;
    background:#08080a;
    box-shadow:
      0 0 0 1px rgba(255,214,10,.5),
      0 0 22px -2px rgba(14,68,255,.7),
      inset 0 0 30px -6px rgba(14,68,255,.4);
  }
  .disc canvas{ display:block; width:100%; height:100%; }
  .big{ width:360px; height:360px; }
  .hero{ width:84px; height:84px; }
  .caption{
    font-size:10px;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:rgba(255,214,10,.66);
    max-width:240px;
    text-align:center;
    line-height:1.5;
  }
</style>
</head>
<body>
  <h1>Ice Crystal 6-Fold — Day Kaleidoscope Candidate</h1>
  <div class="stage">
    <div class="cell">
      <div class="disc big"><canvas id="kbig"></canvas></div>
      <div class="caption">big — 360px</div>
    </div>
    <div class="cell">
      <div class="disc hero"><canvas id="khero"></canvas></div>
      <div class="caption">at hero size — does it read small?</div>
    </div>
  </div>

<script>
(function(){
  "use strict";

  // ---- deterministic PRNG (mulberry32), seeded with this variant's SEED ----
  function mulberry32(a){
    return function(){
      a |= 0; a = (a + 0x6D2B79F5) | 0;
      var t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }
  var SEED = 20260615;   // ice-crystal-6fold — the quiet Monday seed

  // brand-tuned blue/white palette stops (rgb) — this variant leans ICE+WHITE
  var WHITE   = [234,241,255];   // near-white ice glint
  var ICE     = [200,222,255];   // pale ice-blue
  var ICE2    = [160,200,255];   // soft ice-blue
  var CYAN    = [120,190,255];   // cool cyan tint
  var EBLUE   = [77,130,255];    // mid electric blue (sparse accents only)
  var DEEPNAV = [16,34,92];      // deep navy frost glow

  function rgba(c, a){ return "rgba(" + c[0] + "," + c[1] + "," + c[2] + "," + a + ")"; }

  var WEDGES = 6;                          // 6-fold (hexagonal) symmetry
  var WEDGE_ANG = (Math.PI * 2) / WEDGES;  // 60deg
  var HALF = WEDGE_ANG / 2;                // 30deg half-wedge (mirrored)

  // reduced-motion check
  var REDUCED = false;
  try {
    REDUCED = window.matchMedia &&
              window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  } catch(e){ REDUCED = false; }

  // ---- author the SPARSE half-wedge crystal geometry ----------------------
  // Everything authored in the half-wedge angular range [0 .. HALF] and radial
  // [0 .. ~1.0]. Mirroring across the bisector (angle 0) + 6x rotation makes a
  // true 6-fold snowflake mandala. The bisector itself (angle 0) carries the
  // main dendrite SPINE so the mirror produces a clean centred needle per arm.
  var CRYSTAL = (function(){
    var rnd = mulberry32(SEED);
    var needles = [];   // {a0,r0,a1,r1,w,col,glow,phase,shimmer,bright}
    var hexes   = [];   // {a,r,size,rot,col,fill,phase,shimmer}
    var flecks  = [];   // {a,r,size,col,phase,shimmer}

    // -- 1. the main spine: along the bisector (angle 0), from core to rim --
    // built as a chain of segments so it can taper.
    var spineSegs = 6;
    var spineR0 = 0.12, spineR1 = 0.98;
    for (var s = 0; s < spineSegs; s++){
      var f0 = s / spineSegs, f1 = (s + 1) / spineSegs;
      var r0 = spineR0 + (spineR1 - spineR0) * f0;
      var r1 = spineR0 + (spineR1 - spineR0) * f1;
      needles.push({
        a0: 0, r0: r0, a1: 0, r1: r1,
        w: 0.013 * (1 - f0 * 0.55),                 // taper outward
        col: f0 < 0.4 ? WHITE : ICE,
        glow: 0.5 * (1 - f0 * 0.5),
        phase: rnd() * 6.283, shimmer: 0.10 + rnd() * 0.10,
        bright: 0.85 - f0 * 0.25
      });
    }

    // -- 2. side-needles branching off the spine (the dendrite arms) --------
    // each at a node along the spine, angling away from the bisector. Because
    // we also mirror the half-wedge, a branch authored at +angle gets a twin at
    // -angle automatically -> classic snowflake V-branches.
    var branchNodes = [0.30, 0.45, 0.58, 0.70, 0.82];
    for (var b = 0; b < branchNodes.length; b++){
      var nr = branchNodes[b];
      // branch length shrinks toward the rim; angle opens modestly (stay within wedge)
      var bl = (0.20 - b * 0.026) * (0.9 + rnd() * 0.25);
      var bang = HALF * (0.42 + rnd() * 0.30);        // direction within half-wedge
      var ar = nr + Math.cos(0) * 0;                  // node radius
      // approximate branch end in polar: convert via small-cartesian step
      var bx = Math.cos(0) * nr + Math.cos(bang) * bl;
      var by = Math.sin(0) * nr + Math.sin(bang) * bl;
      var endR = Math.sqrt(bx * bx + by * by);
      var endA = Math.atan2(by, bx);
      needles.push({
        a0: 0, r0: nr, a1: endA, r1: endR,
        w: 0.0085 - b * 0.0008,
        col: rnd() < 0.6 ? ICE : ICE2,
        glow: 0.32,
        phase: rnd() * 6.283, shimmer: 0.12 + rnd() * 0.12,
        bright: 0.7 - b * 0.06
      });
      // tiny secondary tick off each branch (sub-dendrite) for crystalline detail
      var mx = Math.cos(0) * nr + Math.cos(bang) * bl * 0.55;
      var my = Math.sin(0) * nr + Math.sin(bang) * bl * 0.55;
      var midR = Math.sqrt(mx * mx + my * my);
      var midA = Math.atan2(my, mx);
      var tl = bl * 0.34;
      var tang = HALF * (0.78 + rnd() * 0.20);
      var tx = mx + Math.cos(tang) * tl;
      var ty = my + Math.sin(tang) * tl;
      needles.push({
        a0: midA, r0: midR, a1: Math.atan2(ty, tx), r1: Math.sqrt(tx*tx + ty*ty),
        w: 0.005,
        col: ICE2, glow: 0.22,
        phase: rnd() * 6.283, shimmer: 0.16 + rnd() * 0.12,
        bright: 0.55
      });
    }

    // -- 3. a small seed hexagon at the core + a couple along the arm -------
    hexes.push({
      a: 0, r: 0.205, size: 0.072, rot: rnd() * 6.283,
      col: WHITE, fill: 0.10,
      phase: rnd() * 6.283, shimmer: 0.10 + rnd() * 0.08
    });
    hexes.push({
      a: HALF * (0.30 + rnd() * 0.2), r: 0.52, size: 0.045, rot: rnd() * 6.283,
      col: ICE, fill: 0.06,
      phase: rnd() * 6.283, shimmer: 0.14 + rnd() * 0.10
    });
    hexes.push({
      a: HALF * (0.50 + rnd() * 0.25), r: 0.78, size: 0.034, rot: rnd() * 6.283,
      col: ICE2, fill: 0.05,
      phase: rnd() * 6.283, shimmer: 0.16 + rnd() * 0.10
    });

    // -- 4. sparse ice flecks (tiny bright points) for shimmer/air ----------
    var fleckN = 7;
    for (var k = 0; k < fleckN; k++){
      flecks.push({
        a: rnd() * HALF,
        r: 0.34 + rnd() * 0.62,
        size: 0.006 + rnd() * 0.012,
        col: rnd() < 0.55 ? WHITE : (rnd() < 0.6 ? ICE : CYAN),
        phase: rnd() * 6.283,
        shimmer: 0.30 + rnd() * 0.35
      });
    }

    // one or two faint electric-blue accent needles (sparse, the brand spark)
    needles.push({
      a0: 0, r0: 0.46, a1: HALF * 0.62, r1: 0.66,
      w: 0.006, col: EBLUE, glow: 0.4,
      phase: rnd() * 6.283, shimmer: 0.18, bright: 0.6
    });

    return { needles: needles, hexes: hexes, flecks: flecks };
  })();

  // ---- a single renderer instance bound to one canvas ---------------------
  function makeRenderer(canvas){
    if (!canvas) return null;
    var ctx;
    try { ctx = canvas.getContext("2d"); } catch(e){ ctx = null; }
    if (!ctx) return null;   // guard: degrade silently if 2d unavailable

    var dpr = Math.min(window.devicePixelRatio || 1, 2);
    var cssW = canvas.clientWidth || canvas.width || 360;
    var cssH = canvas.clientHeight || canvas.height || 360;

    function resize(){
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      cssW = canvas.clientWidth || cssW;
      cssH = canvas.clientHeight || cssH;
      canvas.width = Math.max(1, Math.round(cssW * dpr));
      canvas.height = Math.max(1, Math.round(cssH * dpr));
    }
    resize();

    // polar (angle,radiusNorm) -> device xy around an origin already translated
    function px(ang, rNorm, R){
      return [ Math.cos(ang) * rNorm * R, Math.sin(ang) * rNorm * R ];
    }

    // draw one needle (a tapered line segment) in local wedge space
    function drawNeedle(n, R, t, sgn){
      var p0 = px(n.a0 * sgn, n.r0, R);
      var p1 = px(n.a1 * sgn, n.r1, R);
      var sm = REDUCED ? 1 : (1 + Math.sin(t * 0.8 + n.phase) * n.shimmer);
      var a = Math.max(0, Math.min(1, n.bright * sm));
      var lw = Math.max(0.45, n.w * R);

      // soft frost glow underneath the brightest needles
      if (n.glow > 0){
        ctx.lineWidth = lw * 3.0;
        ctx.strokeStyle = rgba(DEEPNAV, n.glow * 0.5 * a);
        ctx.beginPath(); ctx.moveTo(p0[0], p0[1]); ctx.lineTo(p1[0], p1[1]); ctx.stroke();
        ctx.lineWidth = lw * 1.9;
        ctx.strokeStyle = rgba(n.col, n.glow * 0.22 * a);
        ctx.beginPath(); ctx.moveTo(p0[0], p0[1]); ctx.lineTo(p1[0], p1[1]); ctx.stroke();
      }
      // crisp bright needle core
      ctx.lineWidth = lw;
      ctx.lineCap = "round";
      ctx.strokeStyle = rgba(n.col, a);
      ctx.beginPath(); ctx.moveTo(p0[0], p0[1]); ctx.lineTo(p1[0], p1[1]); ctx.stroke();
    }

    // draw one small hexagon facet centred at polar (a,r)
    function drawHex(hx, R, t, sgn){
      var c = px(hx.a * sgn, hx.r, R);
      var sm = REDUCED ? 1 : (1 + Math.sin(t * 0.7 + hx.phase) * hx.shimmer);
      var sz = hx.size * R;
      var rot = hx.rot + (sgn < 0 ? Math.PI / 6 : 0);
      ctx.beginPath();
      for (var i = 0; i < 6; i++){
        var ang = rot + i * (Math.PI / 3);
        var x = c[0] + Math.cos(ang) * sz;
        var y = c[1] + Math.sin(ang) * sz;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.closePath();
      // faint glassy fill
      ctx.fillStyle = rgba(hx.col, Math.max(0, hx.fill * sm));
      ctx.fill();
      // crisp edge
      ctx.lineWidth = Math.max(0.4, R * 0.0035);
      ctx.strokeStyle = rgba(hx.col, Math.max(0, 0.42 * sm));
      ctx.stroke();
    }

    // draw one fleck (tiny bright point)
    function drawFleck(fl, R, t, sgn){
      var c = px(fl.a * sgn, fl.r, R);
      var sm = REDUCED ? 0.7 : (0.5 + (Math.sin(t * 1.3 + fl.phase) * 0.5 + 0.5) * fl.shimmer + 0.2);
      var a = Math.max(0, Math.min(1, sm));
      var sz = Math.max(0.6, fl.size * R);
      var g = ctx.createRadialGradient(c[0], c[1], 0, c[0], c[1], sz * 2.4);
      g.addColorStop(0, rgba(fl.col, a));
      g.addColorStop(0.5, rgba(fl.col, a * 0.4));
      g.addColorStop(1, rgba(fl.col, 0));
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(c[0], c[1], sz * 2.4, 0, Math.PI * 2);
      ctx.fill();
    }

    // draw the full half-wedge (needles + hexes + flecks); sgn flips the mirror
    function drawHalf(R, t, sgn){
      var i;
      for (i = 0; i < CRYSTAL.needles.length; i++) drawNeedle(CRYSTAL.needles[i], R, t, sgn);
      for (i = 0; i < CRYSTAL.hexes.length;   i++) drawHex(CRYSTAL.hexes[i],     R, t, sgn);
      for (i = 0; i < CRYSTAL.flecks.length;  i++) drawFleck(CRYSTAL.flecks[i],  R, t, sgn);
    }

    function render(timeMs){
      var t = REDUCED ? 0 : timeMs / 1000;
      var w = canvas.width, h = canvas.height;
      var cx = w / 2, cy = h / 2;
      var R = Math.min(w, h) / 2;

      ctx.setTransform(1,0,0,1,0,0);
      ctx.clearRect(0,0,w,h);

      // deep near-black field bleeding into deep navy (lots of dark space)
      var bg = ctx.createRadialGradient(cx, cy, R*0.04, cx, cy, R);
      bg.addColorStop(0, "#0b1130");
      bg.addColorStop(0.45, "#070a1c");
      bg.addColorStop(1, "#08080a");
      ctx.fillStyle = bg;
      ctx.fillRect(0,0,w,h);

      // clip everything to the iris disc
      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, R, 0, Math.PI*2);
      ctx.clip();

      // slowest turn of the family (~58s/rev) + barely-there breathing
      var spin = REDUCED ? 0 : (t / 58) * Math.PI * 2;
      var breathe = REDUCED ? 1 : (1 + Math.sin(t * 0.42) * 0.010);

      ctx.globalCompositeOperation = "lighter";   // glassy additive ice

      for (var wn = 0; wn < WEDGES; wn++){
        var baseAng = spin + wn * WEDGE_ANG;
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(baseAng);
        ctx.scale(breathe, breathe);
        // clip to the wedge sector so geometry never bleeds across seams
        ctx.beginPath();
        ctx.moveTo(0,0);
        ctx.arc(0,0, R*1.18, -HALF, HALF);
        ctx.closePath();
        ctx.clip();
        drawHalf(R, t, 1);    // half-wedge
        drawHalf(R, t, -1);   // its mirror -> 6-fold snowflake symmetry
        ctx.restore();
      }

      ctx.globalCompositeOperation = "source-over";

      // central frost glint (small + restrained; this is the quiet variant)
      var coreR = R * 0.24;
      var core = ctx.createRadialGradient(cx, cy, 0, cx, cy, coreR);
      core.addColorStop(0, "rgba(234,241,255,0.92)");
      core.addColorStop(0.22, "rgba(200,222,255,0.42)");
      core.addColorStop(0.6, "rgba(77,130,255,0.12)");
      core.addColorStop(1, "rgba(14,68,255,0)");
      ctx.globalCompositeOperation = "lighter";
      ctx.fillStyle = core;
      ctx.beginPath();
      ctx.arc(cx, cy, coreR, 0, Math.PI*2);
      ctx.fill();
      ctx.globalCompositeOperation = "source-over";

      ctx.restore(); // end iris clip

      // ---- iris hardware over the kaleidoscope --------------------------
      // dark pupil
      var pupilR = R * 0.14;
      ctx.beginPath();
      ctx.arc(cx, cy, pupilR, 0, Math.PI*2);
      ctx.fillStyle = "#08080a";
      ctx.fill();
      ctx.lineWidth = Math.max(0.6, R*0.006);
      ctx.strokeStyle = "rgba(14,68,255,0.5)";
      ctx.stroke();

      // catch-light glint, upper-left of center
      var glX = cx + (-0.045) * R;
      var glY = cy + (-0.055) * R;
      var glR = R * 0.025;
      var gl = ctx.createRadialGradient(glX, glY, 0, glX, glY, glR*1.6);
      gl.addColorStop(0, "rgba(234,241,255,1)");
      gl.addColorStop(0.6, "rgba(234,241,255,0.85)");
      gl.addColorStop(1, "rgba(234,241,255,0)");
      ctx.fillStyle = gl;
      ctx.beginPath();
      ctx.arc(glX, glY, glR*1.6, 0, Math.PI*2);
      ctx.fill();

      // minimal gold rim (brand mark) — kept very subtle
      ctx.beginPath();
      ctx.arc(cx, cy, R - Math.max(0.5, R*0.01), 0, Math.PI*2);
      ctx.lineWidth = Math.max(0.5, R*0.012);
      ctx.strokeStyle = "rgba(255,214,10,0.16)";
      ctx.stroke();
    }

    var raf = 0;
    function loop(ts){
      render(ts || 0);
      if (!REDUCED) raf = requestAnimationFrame(loop);
    }
    function start(){
      if (REDUCED){ render(0); }
      else { raf = requestAnimationFrame(loop); }
    }

    var roTimer = 0;
    function onResize(){
      if (roTimer) return;
      roTimer = setTimeout(function(){
        roTimer = 0; resize();
        if (REDUCED) render(0);
      }, 120);
    }
    try { window.addEventListener("resize", onResize); } catch(e){}

    start();
    return { render: render };
  }

  function boot(){
    try { makeRenderer(document.getElementById("kbig")); } catch(e){}
    try { makeRenderer(document.getElementById("khero")); } catch(e){}
  }

  if (document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", boot);
  } else {
    boot();
  }
})();
</script>
</body>
</html>
