<html lang="en">
<head>

<style>
:root{--gold:#FFD60A;--gold-soft:#d9b400;--bg:#08080a;--text:#ece7d6;--dim:#8f8a73;--electric:#0E44FF;
  --font:'Bahnschrift','DIN Alternate','Century Gothic','Futura',system-ui,sans-serif;}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
  padding:clamp(2.5rem,8vw,5rem) 1.5rem;overflow-x:hidden;position:relative;letter-spacing:.015em}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(255,214,10,.022) 1px,transparent 1px),linear-gradient(90deg,rgba(255,214,10,.022) 1px,transparent 1px);
  background-size:46px 46px;mask-image:radial-gradient(circle at 50% 44%,#000 24%,transparent 80%)}
.back{position:absolute;top:clamp(1.1rem,4vw,1.8rem);left:clamp(1.1rem,4vw,1.8rem);z-index:2;
  font-size:.7rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);text-decoration:none;
  border:1px solid rgba(255,214,10,.28);padding:.4rem .7rem;border-radius:2px;transition:.16s ease}
.back:hover{border-color:var(--gold);background:rgba(255,214,10,.05)}
.wrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;max-width:640px;
  animation:rise 1.6s cubic-bezier(.22,1,.36,1) both}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.sigil{width:clamp(58px,12vw,80px);height:auto;margin-bottom:clamp(2rem,6vw,3rem);filter:drop-shadow(0 0 12px rgba(255,214,10,.18));overflow:visible}
.sigil .ring-charge{filter:drop-shadow(0 0 6px #0E44FF) drop-shadow(0 0 16px rgba(14,68,255,.55))}
.eyebrow{font-size:.7rem;letter-spacing:.34em;text-transform:uppercase;color:var(--dim);margin-bottom:1.6rem}
.lead{font-size:clamp(.8rem,2.6vw,.95rem);letter-spacing:.12em;text-transform:uppercase;color:var(--gold-soft);margin-bottom:1.1rem}
.name{font-size:clamp(2.1rem,8vw,3.4rem);line-height:1.02;font-weight:600;letter-spacing:.02em;color:var(--gold);
  text-shadow:0 1px 0 #b88e00,0 2px 5px rgba(0,0,0,.5)}
.aka{margin-top:.9rem;font-size:clamp(.95rem,3vw,1.15rem);font-style:italic;color:var(--text);letter-spacing:.02em}
.role{margin-top:1.4rem;font-size:.72rem;letter-spacing:.28em;text-transform:uppercase;color:var(--dim)}
.story{margin-top:2.4rem;font-size:.74rem;letter-spacing:.16em;text-transform:uppercase;color:var(--dim)}
.story .soon{color:var(--gold-soft);border-bottom:1px dotted rgba(217,180,0,.5);padding-bottom:1px}
.way{margin-top:clamp(2.6rem,7vw,3.6rem);font-size:clamp(.92rem,3vw,1.1rem);letter-spacing:.04em;color:var(--text)}
.way b{color:#fff;font-weight:600;text-shadow:0 0 6px rgba(14,68,255,.9),0 0 16px rgba(14,68,255,.55)}
footer{position:absolute;bottom:clamp(1.2rem,4vw,2rem);z-index:1;font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;color:var(--dim)}
/* a11y polish */
.skip-link{position:absolute;left:-9999px;top:0;background:var(--gold);color:var(--bg);font-size:.78rem;letter-spacing:.14em;
  text-transform:uppercase;padding:.6rem 1rem;font-weight:700;text-decoration:none;border-radius:0 0 4px 4px;z-index:1000}
.skip-link:focus{left:1rem;outline:none}
:focus-visible{outline:2px solid var(--electric);outline-offset:2px;border-radius:2px}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.01ms !important;animation-iteration-count:1 !important;
    transition-duration:.01ms !important;scroll-behavior:auto !important}
}
</style>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <a class="back" href="/" translate="no">&larr;&nbsp;37th&nbsp;Chamber</a>
  <main class="wrap" id="main">
    <svg class="sigil" viewBox="0 0 200 200" aria-label="The Sigil">
      <circle class="ring-charge" cx="100" cy="100" r="90" fill="none" stroke="#FFD500" stroke-width="2"/>
      <rect x="36.35" y="36.35" width="127.3" height="127.3" fill="none" stroke="#FFD500" stroke-width="2"/>
      <g stroke="#FFD500" stroke-width="3" stroke-linecap="round">
        <line x1="100" y1="100" x2="36.35" y2="36.35"/><line x1="100" y1="100" x2="163.65" y2="36.35"/>
        <line x1="100" y1="100" x2="163.65" y2="163.65"/><line x1="100" y1="100" x2="36.35" y2="163.65"/>
        <line x1="100" y1="100" x2="100" y2="36.35"/><line x1="100" y1="100" x2="163.65" y2="100"/>
        <line x1="100" y1="100" x2="100" y2="163.65"/><line x1="100" y1="100" x2="36.35" y2="100"/>
      </g>
      <g fill="#FFD500"><circle cx="36.35" cy="36.35" r="6"/><circle cx="163.65" cy="36.35" r="6"/><circle cx="163.65" cy="163.65" r="6"/><circle cx="36.35" cy="163.65" r="6"/><circle cx="100" cy="36.35" r="5"/><circle cx="163.65" cy="100" r="5"/><circle cx="100" cy="163.65" r="5"/><circle cx="36.35" cy="100" r="5"/></g>
      <circle class="ring-charge" cx="100" cy="100" r="9" fill="none" stroke="#FFD500" stroke-width="2"/><circle cx="100" cy="100" r="4" fill="#FFD500"/>
    </svg>
    <div class="eyebrow">In gratitude</div>
    <div class="lead">The 37th Chamber is built for</div>
    <h1 class="name">Alana</h1>
    <div class="role">the faceless man&rsquo;s mother</div>
    <div class="story">her story &middot; <span class="soon">coming</span></div>
    <p class="way">this is the way to <b>gratitude</b>.</p>
  </main>
  <footer>knowledge is free &middot; forever</footer>
</body>
</html>
